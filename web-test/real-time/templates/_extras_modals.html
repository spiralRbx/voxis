<div id="modal-drive" class="modal">
  <div class="modal-header"><h3>Drive</h3><button class="modal-close">&times;</button></div>
  <div class="modal-body">
    <section class="control-group">
      <h3>Drive</h3>
      <label class="slider-field"><span>Drive</span><output for="drive" id="drive-value">1.00x</output><input id="drive" type="range" min="1" max="8" step="0.01" value="1"></label>
    </section>
  </div>
</div>
